<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" type="text/css" href="/style.css" />
  <!--<script type="text/javascript" src="script.js"></script>-->
  <script>
    function formatMAC(input) {
        let value = input.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase(); // Elimina caràcters no hexadecimals
        let formattedValue = '';
        
        for (let i = 0; i < value.length; i += 2) {
            if (i > 0) {
                formattedValue += ':';
            }
            formattedValue += value.substr(i, 2);
        }
        
        input.value = formattedValue;
    }

    function fetchMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("macSaved").innerHTML =
          this.responseText;
        }
      };
      xhttp.open("GET", "/mac", true);
      xhttp.send();
    }

    function fetchMyMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("myMac").innerHTML =
          this.responseText;
        }
      };
      xhttp.open("GET", "/mymac", true);
      xhttp.send();
    }

    // function fetchMacList() {
    //   var xhttp = new XMLHttpRequest();
    //   xhttp.onreadystatechange = function() {
    //     if (this.readyState == 4 && this.status == 200) {
    //       document.getElementById("macList").innerHTML =
    //       this.responseText;
    //     }
    //   };
    //   xhttp.open("GET", "/macList", true);
    //   xhttp.send();
    // }

        // Funció per obtenir la llista d'adreces MAC
    function fetchMacList() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          const macList = this.responseText.split("\n");
          const macListContainer = document.getElementById("macList");
          macListContainer.innerHTML = ''; // Neteja la llista abans d'omplir-la
          
          // Iterem sobre les adreces MAC i les afegim a la llista
          macList.forEach(mac => {
            const macDiv = document.createElement("div");
            macDiv.classList.add("mac-item");
            macDiv.innerText = mac.split(" >> ")[1];
            macDiv.style.cursor = 'pointer';
            macDiv.onclick = function() { setMac(mac); }; // Quan es fa clic, s'afegeix al camp d'entrada
            macListContainer.appendChild(macDiv);
          });
        }
      };
      xhttp.open("GET", "/macList", true);
      xhttp.send();
    }

    // Funció per establir la MAC seleccionada al camp d'entrada
    function setMac(mac) {
      document.getElementById("mac").value = mac.split(" >> ")[0]; // Col·loca la MAC seleccionada al camp d'entrada
    }

    window.onload = function() {
      fetchMyMac();
      fetchMac();     // Crida a fetchMac per obtenir la MAC actual
      fetchMacList(); // Crida a fetchMacList per obtenir la llista d'adreces MAC
    }

  </script>
  <title>EspLink Manager</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>EspLink Manager</h1>
    </header>
    <label for="ssid">La meva MAC</label>
    <div id="myMacDiv" class="values">
      <p><span id="myMac"></span></p>
    </div>
    <!-- <h2>Adreça MAC de l'esclau:</h2> -->
    <label for="ssid">MAC esclau guardat</label>
    <div id="macG" class="values">
      <p><span id="macSaved"></span></p>
    </div>
    <form action="/" method="POST">
      <label for="ssid">Nova MAC</label>
      <input type="text" id="mac" name="mac" placeholder="ex: 64:e8:33:c7:62:50" maxlength="17" pattern="([A-Fa-f0-9]{2}:){5}[A-Fa-f0-9]{2}" title="Please enter the SSID in the format XX:XX:XX:XX:XX:XX" oninput="formatMAC(this)"/>

      <input type="submit" value="Guarda MAC" />
    </form>
    <h3>Dispositius trovats [selecciona un]</h3>
    <div id="macList"></div>  <!-- Aquí es mostrarà la llista d'adreces MAC -->
  </div>
</body>
