<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>BlauLink Manager</title>
  <style>
    :root {
      --primary-color: #1a5276;
      --secondary-color: #2980b9;
      --background-color: #f8f8f8;
      --card-background: #fff;
      --text-color: #333;
      --border-radius: 8px;
      --box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
      padding-bottom: 60px; /* Space for footer */
      min-height: 100vh;
      position: relative;
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      margin-bottom: 20px;
    }

    .header-title {
      display: flex;
      align-items: center;
    }

    h1 {
      color: var(--primary-color);
      font-size: 1.8rem;
      margin: 0;
    }

    .github-link {
      display: flex;
      align-items: center;
      color: var(--primary-color);
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .github-link:hover {
      opacity: 0.8;
    }

    .github-icon {
      width: 24px;
      height: 24px;
      margin-right: 5px;
    }

    .card {
      background-color: var(--card-background);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 15px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--primary-color);
    }

    .values {
      padding: 10px;
      background-color: #f5f5f5;
      border-radius: 5px;
      word-break: break-all;
    }

    .values p {
      margin: 0;
      font-size: 16px;
    }

    .values span {
      font-weight: bold;
      color: var(--secondary-color);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: var(--border-radius);
      font-size: 16px;
      transition: border 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--secondary-color);
      outline: none;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    input[type="submit"]:hover {
      background-color: var(--secondary-color);
    }

    h3 {
      margin: 20px 0 10px;
      color: var(--primary-color);
    }

    #macList {
      margin-top: 10px;
    }

    .mac-item {
      background-color: #f0f0f0;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: var(--border-radius);
      transition: background-color 0.2s;
    }

    .mac-item:hover {
      background-color: #e0e0e0;
    }
    
    footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 15px;
      background-color: var(--primary-color);
      color: white;
      font-size: 14px;
    }
    
    @media (max-width: 480px) {
      .container {
        width: 95%;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .values {
        padding: 8px;
      }
    }
  </style>
  <script>
    function formatMAC(input) {
        let value = input.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase();
        let formattedValue = '';
        
        for (let i = 0; i < value.length && i < 12; i += 2) {
            if (i > 0) {
                formattedValue += ':';
            }
            formattedValue += value.substr(i, 2);
        }
        
        input.value = formattedValue;
    }

    function fetchMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("macSaved").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "/mac", true);
      xhttp.send();
    }

    function fetchMyMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("myMac").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "/mymac", true);
      xhttp.send();
    }

    function fetchMacList() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          const macList = this.responseText.split("\n");
          const macListContainer = document.getElementById("macList");
          macListContainer.innerHTML = '';
          
          if (macList.length === 0 || (macList.length === 1 && macList[0] === "")) {
            macListContainer.innerHTML = '<p class="no-devices">No se han encontrado dispositivos</p>';
            return;
          }
          
          macList.forEach(mac => {
            if (mac.trim() === "") return;
            
            const macDiv = document.createElement("div");
            macDiv.classList.add("mac-item");
            const macParts = mac.split(" >> ");
            if (macParts.length > 1) {
              macDiv.innerText = macParts[1];
              macDiv.setAttribute('data-mac', macParts[0]);
            } else {
              macDiv.innerText = mac;
              macDiv.setAttribute('data-mac', mac);
            }
            macDiv.onclick = function() { setMac(this.getAttribute('data-mac')); };
            macListContainer.appendChild(macDiv);
          });
        }
      };
      xhttp.open("GET", "/macList", true);
      xhttp.send();
    }

    function setMac(mac) {
      document.getElementById("mac").value = mac;
    }

    function refreshDevices() {
      fetchMacList();
    }

    window.onload = function() {
      fetchMyMac();
      fetchMac();
      fetchMacList();
      
      // Establecer un temporizador para actualizar la lista de dispositivos cada 30 segundos
      setInterval(refreshDevices, 30000);
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>BlauLink Manager</h1>
      </div>
      <a href="https://github.com/CasamaMaker/BlauLink" class="github-link" target="_blank">
        <svg class="github-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
      </a>
    </header>
    
    <div class="card">
      <label for="myMac">La meva direcció MAC</label>
      <div class="values">
        <p><span id="myMac">Carregant...</span></p>
      </div>
    </div>
    
    <div class="card">
      <label for="macSaved">MAC esclau guardada</label>
      <div class="values">
        <p><span id="macSaved">Carregant...</span></p>
      </div>
    </div>
    
    <div class="card">
      <form action="/" method="POST">
        <label for="mac">Nova MAC</label>
        <input type="text" id="mac" name="mac" placeholder="XX:XX:XX:XX:XX:XX" maxlength="17" pattern="([A-Fa-f0-9]{2}:){5}[A-Fa-f0-9]{2}" title="Formato requerido: XX:XX:XX:XX:XX:XX" oninput="formatMAC(this)"/>
        <input type="submit" value="Guardar MAC" />
      </form>
    </div>
    
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Dispositius trobats</h3>
        <button onclick="refreshDevices()" style="background: none; border: none; cursor: pointer; color: var(--primary-color);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
      <div id="macList">
        <p>Carregant Dispositius...</p>
      </div>
    </div>
  </div>
  
  <footer>
    <p>BlauLink 0.1 per Martí Casamayor</p>
  </footer>
</body>
</html>
