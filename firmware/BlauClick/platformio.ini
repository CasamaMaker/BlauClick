; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; default_envs = esp32c3
default_envs = esp32c3, esp32, esp32s3, esp32s2, esp32c6
build_dir = C:\.pio_builds\BlauClick


; --- Flags comuns a tots els entorns ---
[flags]
base =
    -DCORE_DEBUG_LEVEL=0
    -Wno-deprecated-declarations

; --- Compartit per tots els entorns (herència automàtica) ---
[env]
framework              = arduino
monitor_speed          = 115200
upload_speed           = 460800
board_build.filesystem = littlefs
board_build.flash_mode = qio
platform_packages      = platformio/tool-mklittlefs@^1.203.210628
lib_deps =
    ESP32Async/AsyncTCP@3.4.10
    ESP32Async/ESPAsyncWebServer@3.6.0
    adafruit/Adafruit NeoPixel@1.15.4

; --- ESP32-C3 (RISC-V, USB natiu) ---
[env:esp32c3]
platform    = espressif32
board       = esp32-c3-devkitm-1
build_flags =
    ${flags.base}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1


; --- ESP32 original (Xtensa dual-core, UART via CH340/CP2102) ---
[env:esp32]
platform    = espressif32
board       = esp32dev
build_flags = ${flags.base}


; --- ESP32-S3 (Xtensa dual-core, USB natiu, BLE 5) ---
[env:esp32s3]
platform    = espressif32
board       = esp32-s3-devkitc-1
build_flags =
    ${flags.base}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1


; --- ESP32-S2 (Xtensa single-core, USB natiu, sense BLE) ---
; Nota: ARDUINO_USB_MODE=1 no és compatible amb S2 (no exposa Serial), s'usa CDC pur
[env:esp32s2]
platform    = espressif32
board       = esp32-s2-saola-1
build_flags =
    ${flags.base}
    -DARDUINO_USB_CDC_ON_BOOT=1


; --- ESP32-C6 (RISC-V, WiFi 6, USB natiu) ---
[env:esp32c6]
platform    = espressif32
board       = esp32-c6-devkitc-1
build_flags =
    ${flags.base}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
